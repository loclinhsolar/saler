<script>

var SYS = "Ban la chuyen gia ban hang dien mat troi Loc Linh Solar, Nghe An.\nTHONG TIN: Hotline 0817.345.555, Catalogue https://loclinhsolar.github.io/catalogue/, Bao hanh 25 nam, Tra gop 0% lai suat 100tr.\nGOI SP: <2tr->3-5kWp SVE/LuxPower 25-40tr; 2-4tr->5-8kWp LuxPower/GoodWe 40-70tr; 4-6tr->8-12kWp GoodWe/SolaX 70-110tr; >6tr->12kWp+ SolaX/GoodWe 100-150tr.\nNHAN VIEN: Minh Tuan, Lan Anh.\nYEU CAU: JSON thuan tuy, KHONG markdown, bat dau { ket thuc }. Script phai tieng Viet co dau.\nFORMAT: {\"parsed\":{\"name\":\"\",\"phone\":\"\",\"area\":\"\",\"bill\":\"\",\"power\":\"\",\"need\":\"\",\"timing\":\"\",\"knowledge\":\"\"},\"analysis\":{\"priority\":\"Cao/Trung binh/Thap\",\"reason\":\"\",\"package\":\"\",\"price\":\"\",\"saving\":\"\",\"payback\":\"\",\"insight\":\"\",\"tags\":[]},\"s\":{\"c1\":\"\",\"c2\":\"\",\"c3\":\"\",\"c4\":\"\",\"c5\":\"\",\"z1\":\"\",\"z2\":\"\",\"z3\":\"\",\"o1\":\"\",\"o2\":\"\",\"o3\":\"\",\"o4\":\"\",\"o5\":\"\",\"f1\":\"\",\"f3\":\"\",\"f7\":\"\",\"f14\":\"\",\"f30\":\"\",\"cl1\":\"\",\"cl2\":\"\"}}";

function ex(t, pats, def) {
  var lines = t.split("\n");
  for (var i = 0; i < lines.length; i++) {
    // Strip emojis and special chars from start of line for matching
    var clean = lines[i].replace(/[^\u0000-\u007E\u00C0-\u024F\u1E00-\u1EFF]/g, " ").toLowerCase().trim();
    var orig = lines[i];
    for (var j = 0; j < pats.length; j++) {
      if (clean.indexOf(pats[j].toLowerCase()) >= 0 && orig.indexOf(":") >= 0) {
        var v = orig.split(":").slice(1).join(":").replace(/[\[\]]/g,"").replace(/_/g," ").trim();
        if (v && v.length > 0) return v;
      }
    }
  }
  return def || "--";
}

function fallback(t) {
  var nm = ex(t, ["ho ten","h\u1ecd t\u00ean","name","H\u1ecd t\u00ean"], "anh/chị");
  var ph = ex(t, ["sdt","s\u0111t","S\u0110T","phone","\u0111i\u1ec7n tho\u1ea1i"], "--");
  var ar = ex(t, ["khu vuc","khu v\u1ef1c","Khu v\u1ef1c","area"], "--");
  var bi = ex(t, ["tien dien","ti\u1ec1n \u0111i\u1ec7n","Ti\u1ec1n \u0111i\u1ec7n","bill"], "--");
  return {
    parsed: {name:nm, phone:ph, area:ar, bill:bi,
      power: ex(t,["cong suat","c\u00f4ng su\u1ea5t","C\u00f4ng su\u1ea5t","power"],"--"),
      need: ex(t,["nhu cau","nhu c\u1ea7u","Nhu c\u1ea7u","need"],"--"),
      timing: ex(t,["thoi gian","th\u1eddi gian","Th\u1eddi gian","timing"],"--"),
      knowledge: ex(t,["tim hieu","t\u00ecm hi\u1ec3u","T\u00ecm hi\u1ec3u","knowledge"],"--")},
    analysis: {priority:"Cao", reason:"Cần kiểm tra kết nối mạng",
      package:"Xem catalogue để xác định", price:"--", saving:"--", payback:"--",
      insight:"Kết nối mạng để AI phân tích chính xác hơn", tags:["Cần tư vấn"]},
    s: {
      c1: "Dạ em chào "+nm+" ạ! Em là [tên bạn] từ Lộc Linh Solar Nghệ An. Anh/chị vừa để lại thông tin điện mặt trời – em gọi lại hỗ trợ tư vấn miễn phí ạ.",
      c2: "Anh/chị đang dùng điều hòa nhiều không ạ? Em hỏi để tư vấn gói phù hợp nhất cho mình ạ.",
      c3: "Với tiền điện "+bi+" của nhà mình, bên em có gói phù hợp – tổng đầu tư khoảng [X triệu], tiết kiệm [Y triệu]/tháng. Có trả góp 0% lãi suất đến 100 triệu ạ.",
      c4: "Bên em khảo sát miễn phí, không ràng buộc. Anh/chị rảnh chiều Thứ Năm hay sáng Thứ Sáu để em sắp xếp kỹ thuật qua thăm ạ?",
      c5: "Dạ tuyệt! Em nhắn xác nhận lịch qua Zalo ngay ạ. Cảm ơn anh/chị!",
      z1: "Dạ "+nm+" ơi! Em là [tên] – Lộc Linh Solar vừa gọi điện ạ.\nEm xác nhận lịch khảo sát miễn phí:\nNgày: [ngày] | Giờ: [giờ]\nĐịa chỉ: "+ar+"\nKỹ thuật viên sẽ đến đúng giờ ạ! 🙏",
      z2: "Dạ "+nm+" ơi, em là [tên] – Lộc Linh Solar.\nEm gọi chưa nghe máy, nhắn lại qua đây ạ.\nAnh/chị rảnh em gọi lại lúc nào ạ? 🙏",
      z3: "Dạ "+nm+" ơi! Em gửi catalogue sản phẩm:\nhttps://loclinhsolar.github.io/catalogue/\nAnh/chị xem thử rồi mình trao đổi thêm nhé! 🙏",
      o1: "Dạ anh/chị cần thêm thông tin gì không ạ? Em gửi báo giá qua Zalo để tham khảo – không cần quyết định ngay ạ.",
      o2: "Dạ anh/chị đang so sánh với bên nào ạ? Thiết bị khác nhau thì giá khác lắm. Bên em chính hãng bảo hành 10-25 năm ạ.",
      o3: "Dạ không sao ạ. Giá điện EVN đang tăng – mình khảo sát trước miễn phí để có số liệu, khi nào quyết định là làm ngay ạ.",
      o4: "Dạ phải khảo sát thực tế mới biết chính xác – bên em làm miễn phí. Nhiều nhà tưởng không được nhưng vẫn lắp tốt ạ.",
      o5: "Dạ xin lỗi đã làm phiền! Anh/chị rảnh em gọi lại lúc mấy giờ chiều nay ạ?",
      f1: "Gọi ngay khi nhận thông báo. Không nghe máy → nhắn Zalo ngay.",
      f3: "Dạ "+nm+" ơi! Em gửi ảnh công trình thực tế + hóa đơn điện giảm của khách cũ ở Nghệ An để tham khảo ạ! 🏠☀️",
      f7: "Dạ "+nm+" xem báo giá bên em thế nào rồi ạ? Anh/chị còn câu hỏi gì em hỗ trợ thêm nhé! 😊",
      f14: "Gọi lại – hỏi thẳng còn vướng mắc gì. Đây là cơ hội chốt cuối – đừng bỏ.",
      f30: "Dạ "+nm+" ơi! Tháng này bên em có ưu đãi – anh/chị muốn em gửi thông tin không ạ?",
      cl1: "Dạ "+nm+" ơi, em vừa tổng hợp xong báo giá rồi ạ.\nVới hệ [X kWp], tổng đầu tư [Y triệu].\nAnh/chị muốn em giữ lịch thi công tháng này không? Còn 2 slot thôi ạ.",
      cl2: "Dạ "+nm+" ơi! Em xác nhận đơn hàng:\n⚡ Hệ thống: [X kWp] – [tên gói]\n💰 Tổng: [Y triệu] | 📅 Thi công: [ngày]\n🔧 Bảo hành: 25 năm\nAnh/chị xác nhận để em làm hợp đồng nhé! 🙏☀️"
    }
  };
}

function esc(t) { return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function rnd() { return Math.random().toString(36).slice(2,7); }

function sb(lbl, color, txt) {
  var id = "s" + rnd();
  var bid = "b" + id;
  var el = document.createElement("div");
  el.className = "sb";
  el.innerHTML = "<div class=\"sb-l\" style=\"color:" + color + "\">" + lbl + "</div>"
    + "<div class=\"sb-txt\" id=\"" + id + "\">" + esc(txt) + "</div>";
  var btn = document.createElement("button");
  btn.className = "cpbtn";
  btn.id = bid;
  btn.textContent = "Sao ch\u00e9p";
  btn.onclick = function() {
    var txt2 = document.getElementById(id).innerText;
    navigator.clipboard.writeText(txt2).then(function() {
      btn.textContent = "Xong \u2713"; btn.classList.add("ok");
      setTimeout(function() { btn.textContent = "Sao ch\u00e9p"; btn.classList.remove("ok"); }, 2000);
      var t = document.getElementById("toast"); t.classList.add("on");
      setTimeout(function() { t.classList.remove("on"); }, 2000);
    });
  };
  el.insertBefore(btn, el.querySelector(".sb-txt"));
  return el.outerHTML;
}

function step(n, col, title, time, body) {
  var id = "st" + rnd();
  var el = document.createElement("div");
  el.className = "step";
  el.id = id;
  var hdr = document.createElement("div");
  hdr.className = "step-h";
  hdr.innerHTML = "<div class=\"snum\" style=\"background:" + col + "\">" + n + "</div>"
    + "<div style=\"flex:1\"><div class=\"si-t\">" + title + "</div><div class=\"si-s\">" + time + "</div></div>"
    + "<div class=\"sarr\">\u203a</div>";
  hdr.addEventListener("click", function() { el.classList.toggle("op"); });
  var bdy = document.createElement("div");
  bdy.className = "step-b";
  bdy.innerHTML = body;
  el.appendChild(hdr);
  el.appendChild(bdy);
  return el.outerHTML;
}

function obj(q, sc) {
  var inner = sb("TR\u1ea2 L\u1edcI", "#14A44D", sc);
  var el = document.createElement("div");
  el.className = "obj";
  el.innerHTML = "<div class=\"obj-q\">" + q + "</div>" + inner;
  return el.outerHTML;
}

function fi(day, action, note, hasSb, dot) {
  var inner = hasSb ? sb("N\u1ed8I DUNG TIN NH\u1eafN", "#0068FF", note)
    : "<div class=\"fi-n\">" + esc(note) + "</div>";
  return "<div class=\"fi\">"
    + "<div class=\"fi-dot\" style=\"background:" + dot + ";box-shadow:0 0 0 2px " + dot + "\"></div>"
    + "<div class=\"fi-day\">" + day + "</div>"
    + "<div class=\"fi-a\">" + action + "</div>"
    + inner + "</div>";
}

function render(d) {
  var p = d.parsed, a = d.analysis, s = d.s;

  var FLDS = [
    {l:"H\u1ecd t\u00ean", v:p.name, hot:true},
    {l:"S\u0110T", v:p.phone, hot:true},
    {l:"Khu v\u1ef1c", v:p.area, full:true},
    {l:"Ti\u1ec1n \u0111i\u1ec7n/th\u00e1ng", v:p.bill},
    {l:"C\u00f4ng su\u1ea5t", v:p.power},
    {l:"Nhu c\u1ea7u", v:p.need},
    {l:"Th\u1eddi gian", v:p.timing, hot:true},

async function run() {
  var txt = document.getElementById("tin").value.trim();
  if (!txt) { alert("Vui long paste thong tin khach hang vao!"); return; }
  document.getElementById("goBtn").disabled = true;
  document.getElementById("spin").classList.add("on");
  document.getElementById("out").classList.remove("on");
  var d;
  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: SYS,
        messages: [{role:"user", content:"Phan tich lead sau, tra ve JSON thuan tuy:\n\n" + txt}]
      })
    });
    var raw = await res.json();
    if (raw.error) throw new Error(raw.error.message);
    var t = raw.content[0].text;
    var a = t.indexOf("{"), b = t.lastIndexOf("}");
    d = JSON.parse(t.slice(a, b + 1));
  } catch(e) {
    console.warn("fallback:", e.message);
    d = fallback(txt);
  }
  render(d);
  document.getElementById("spin").classList.remove("on");
  document.getElementById("goBtn").disabled = false;
}

function clr() {
  document.getElementById("tin").value = "";
  document.getElementById("out").classList.remove("on");
}
function sw(id, btn) {
  document.querySelectorAll(".tc").forEach(function(t) { t.classList.remove("on"); });
  document.querySelectorAll(".tab").forEach(function(b) { b.classList.remove("on"); });
  document.getElementById("tc-" + id).classList.add("on");
  btn.classList.add("on");
}
function tog(id) { document.getElementById(id).classList.toggle("op"); }

</script>
